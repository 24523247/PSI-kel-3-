<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Input Kesehatan</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Masukkan Kondisi Kesehatan Anda</h1>

<div class="form-container">

    <input type="text" id="nama" placeholder="Nama">
    <input type="number" id="umur" placeholder="Umur">

    <select id="kondisi">
        <option value="">Pilih Kondisi</option>
        <option value="normal">Normal</option>
        <option value="diet">Diet</option>
        <option value="diabetes">Tambah Berat Badan</option>
        <option value="hipertensi">Hipertensi</option>
    </select>

    <button onclick="simpanData()">Lihat Rekomendasi</button>

</div>

<script src="script.js"></script>
</body>
</html>
