```html
<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Daftar Menu</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family: Arial, Helvetica, sans-serif;
    }

    body{
      background: linear-gradient(to right, #141e30, #243b55);
      color:white;
      min-height:100vh;
      padding:40px;
    }

    h1{
      text-align:center;
      margin-bottom:40px;
      font-size:40px;
    }

    .container{
      display:grid;
      grid-template-columns: repeat(auto-fit, minmax(250px,1fr));
      gap:25px;
    }

    .card{
      background:white;
      color:#333;
      border-radius:20px;
      overflow:hidden;
      transition:0.3s;
      box-shadow:0 10px 20px rgba(0,0,0,0.2);
    }

    .card:hover{
      transform:translateY(-10px);
    }

    .card img{
      width:100%;
      height:200px;
      object-fit:cover;
    }

    .card-content{
      padding:20px;
    }

    .menu-title{
      font-size:24px;
      margin-bottom:10px;
      font-weight:bold;
    }

    .desc{
      font-size:14px;
      margin-bottom:15px;
      color:#666;
    }

    .price{
      font-size:22px;
      color:#e63946;
      font-weight:bold;
    }

    button{
      margin-top:15px;
      width:100%;
      padding:12px;
      border:none;
      border-radius:10px;
      background:#243b55;
      color:white;
      font-size:16px;
      cursor:pointer;
      transition:0.3s;
    }

    button:hover{
      background:#141e30;
    }
  </style>
</head>

<body>

  <h1>🍔 Daftar Menu</h1>

  <div class="container">

    <div class="card">
      <img src="https://images.unsplash.com/photo-1568901346375-23c9450c58cd?q=80&w=1000" alt="Burger">

      <div class="card-content">
        <div class="menu-title">Burger Special</div>

        <div class="desc">
          Burger daging premium dengan keju dan sayuran segar.
        </div>

        <div class="price">Rp 25.000</div>

        <button>Pesan Sekarang</button>
      </div>
    </div>

    <div class="card">
      <img src="https://images.unsplash.com/photo-1513104890138-7c749659a591?q=80&w=1000" alt="Pizza">

      <div class="card-content">
        <div class="menu-title">Pizza Mozzarella</div>

        <div class="desc">
          Pizza dengan topping melimpah dan keju mozzarella.
        </div>

        <div class="price">Rp 45.000</div>

        <button>Pesan Sekarang</button>
      </div>
    </div>

    <div class="card">
      <img src="https://images.unsplash.com/photo-1546069901-ba9599a7e63c?q=80&w=1000" alt="Salad">

      <div class="card-content">
        <div class="menu-title">Healthy Salad</div>

        <div class="desc">
          Salad segar cocok untuk menu sehat sehari-hari.
        </div>

        <div class="price">Rp 20.000</div>

        <button>Pesan Sekarang</button>
      </div>
    </div>

  </div>

</body>
</html>
```
