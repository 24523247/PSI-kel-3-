    <div class="sidebar-user" onclick="adminLogout()">

        <span class="user-role" id="sidebarUserRole">Admin</span>

  <!-- MAIN CONTENT -->
  <main class="main-content">

        <span class="breadcrumb-cur">Beranda</span>
      </div>

      <div class="page-header">
        <div class="page-title-row">
          <div>
            <h1>Dashboard</h1>
            <p class="page-subtitle">Ringkasan data restoran Anda</p>
          </div>
        </div>
      </div>

      <!-- Stats Grid -->
      <div class="stats-grid" id="statsGrid">
        <div class="stat-card"><div class="skeleton sk-thumb sk-mb-2"></div><div class="skeleton sk-text sk-w-24 sk-mb-2"></div><div class="skeleton sk-text-sm sk-w-32"></div></div>
        <div class="stat-card"><div class="skeleton sk-thumb sk-mb-2"></div><div class="skeleton sk-text sk-w-24 sk-mb-2"></div><div class="skeleton sk-text-sm sk-w-32"></div></div>
        <div class="stat-card"><div class="skeleton sk-thumb sk-mb-2"></div><div class="skeleton sk-text sk-w-24 sk-mb-2"></div><div class="skeleton sk-text-sm sk-w-32"></div></div>
        <div class="stat-card"><div class="skeleton sk-thumb sk-mb-2"></div><div class="skeleton sk-text sk-w-24 sk-mb-2"></div><div class="skeleton sk-text-sm sk-w-32"></div></div>
      </div>

      <!-- Quick Links -->
      <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-top:8px">

        <a href="kelola-menu.html" class="card" style="padding:20px;display:flex;align-items:center;gap:14px;text-decoration:none;transition:box-shadow .15s" onmouseover="this.style.boxShadow='var(--shadow-sm)'" onmouseout="this.style.boxShadow=''">
          <div class="stat-icon-wrap stat-icon-blue" style="margin-bottom:0">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75"><path d="M9 5h11M9 12h11M9 19h11M4.5 5h.01M4.5 12h.01M4.5 19h.01"/></svg>
          </div>
          <div>
            <div style="font-size:13px;font-weight:600;color:var(--tx)">Kelola Menu</div>
            <div style="font-size:12px;color:var(--tx-muted)">Tambah &amp; edit produk</div>
          </div>
        </a>

        <a href="laporan.html" class="card" style="padding:20px;display:flex;align-items:center;gap:14px;text-decoration:none;transition:box-shadow .15s" onmouseover="this.style.boxShadow='var(--shadow-sm)'" onmouseout="this.style.boxShadow=''">
          <div class="stat-icon-wrap stat-icon-green" style="margin-bottom:0">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
          </div>
          <div>
            <div style="font-size:13px;font-weight:600;color:var(--tx)">Laporan</div>

          </div>

        <a href="pengaturan.html" class="card" style="padding:20px;display:flex;align-items:center;gap:14px;text-decoration:none;transition:box-shadow .15s" onmouseover="this.style.boxShadow='var(--shadow-sm)'" onmouseout="this.style.boxShadow=''">
          <div class="stat-icon-wrap stat-icon-purple" style="margin-bottom:0">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>

      <div id="stockAlertSection" style="margin-top:16px"></div>

<script src="js/auth.js"></script>
<script>
const API = '/backend/api/admin';

async function loadStats() {
  try {
    const res  = await fetch(`${API}/stats.php`, { credentials: 'include' });
    const json = await res.json();
    if (!json.success) return;
    const d = json.data;

    document.getElementById('statsGrid').innerHTML = `
      <div class="stat-card">
        <div class="stat-icon-wrap stat-icon-blue"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75"><path d="M9 5h11M9 12h11M9 19h11M4.5 5h.01M4.5 12h.01M4.5 19h.01"/></svg></div>
        <div class="stat-number">${d.total_menu}</div>
        <div class="stat-label">Total Menu</div>
        <div class="stat-sub"><span class="up">+${d.menu_bulan_ini}</span> bulan ini</div>
      </div>
      <div class="stat-card">
        <div class="stat-icon-wrap stat-icon-green"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75"><path d="M22 11.08V12a10 10 0 11-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg></div>
        <div class="stat-number">${d.menu_aktif}</div>
        <div class="stat-label">Menu Aktif</div>
        <div class="stat-sub"><span class="info">${d.total_menu > 0 ? Math.round(d.menu_aktif/d.total_menu*100) : 0}%</span> dari total menu</div>
      </div>
      <div class="stat-card">
        <div class="stat-icon-wrap stat-icon-purple"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg></div>
        <div class="stat-number">${d.total_pesanan}</div>
        <div class="stat-label">Total Pesanan</div>
        <div class="stat-sub"><span class="up">${d.pesanan_hari_ini}</span> hari ini</div>
      </div>
      <div class="stat-card">
        <div class="stat-icon-wrap stat-icon-orange"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6"/></svg></div>
        <div class="stat-number" style="font-size:18px">${formatRp(d.total_revenue)}</div>
        <div class="stat-label">Total Revenue</div>
        <div class="stat-sub"><span class="info">${d.pesanan_paid}</span> pesanan lunas</div>
      </div>
    `;
  } catch {}
}

function formatRp(n) { return 'Rp ' + Number(n).toLocaleString('id-ID'); }
function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

async function loadStockAlerts() {
  try {
    const res  = await fetch(`${API}/stock-alerts.php`, { credentials: 'include' });
    const json = await res.json();
    if (!json.success || json.data.migration_needed) return;
    const { out_of_stock, low_stock } = json.data;
    if (!out_of_stock.length && !low_stock.length) return;

    let html = '';
    if (out_of_stock.length) {
      html += `<div style="background:#fef2f2;border:1px solid #fca5a5;border-radius:var(--r);padding:16px 20px;margin-bottom:12px">
        <div style="display:flex;align-items:center;gap:10px;margin-bottom:10px">
          <div style="width:8px;height:8px;border-radius:50%;background:#ef4444;flex-shrink:0"></div>
          <span style="font-size:13px;font-weight:700;color:#b91c1c">Stok Habis (${out_of_stock.length} menu)</span>
          <a href="kelola-menu.html" style="margin-left:auto;font-size:12px;color:#b91c1c;font-weight:600">Kelola &rarr;</a>
        </div>
        <div style="display:flex;flex-wrap:wrap;gap:8px">
          ${out_of_stock.map(p => `<span style="background:#fee2e2;border:1px solid #fca5a5;color:#b91c1c;font-size:12px;padding:3px 10px;border-radius:20px;font-weight:500">${esc(p.name)}</span>`).join('')}
        </div>
      </div>`;
    }
    if (low_stock.length) {
      html += `<div style="background:#fffbeb;border:1px solid #fcd34d;border-radius:var(--r);padding:16px 20px">
        <div style="display:flex;align-items:center;gap:10px;margin-bottom:10px">
          <div style="width:8px;height:8px;border-radius:50%;background:#f59e0b;flex-shrink:0"></div>
          <span style="font-size:13px;font-weight:700;color:#92400e">Stok Hampir Habis (${low_stock.length} menu)</span>
          <a href="kelola-menu.html" style="margin-left:auto;font-size:12px;color:#92400e;font-weight:600">Kelola &rarr;</a>
        </div>
        <div style="display:flex;flex-wrap:wrap;gap:8px">
          ${low_stock.map(p => `<span style="background:#fef3c7;border:1px solid #fcd34d;color:#92400e;font-size:12px;padding:3px 10px;border-radius:20px;font-weight:500">${esc(p.name)} &middot; ${p.stock}</span>`).join('')}
        </div>
      </div>`;
    }
    document.getElementById('stockAlertSection').innerHTML = html;
  } catch {}
}

loadStats();
loadStockAlerts();
</script>
</body>
</html>
