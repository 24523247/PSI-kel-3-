<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Notifikasi – Menu Admin</title>
  <link rel="stylesheet" href="css/admin.css">
  <style>
    .notif-list { display: flex; flex-direction: column; gap: 12px; }

    .notif-card {
      display: flex;
      align-items: flex-start;
      gap: 14px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-left: 3px solid var(--accent);
      border-radius: var(--r-lg);
      padding: 16px 18px;
      box-shadow: var(--shadow-xs);
    }

    .notif-icon {
      width: 38px; height: 38px;
      background: var(--accent-bg, #EEF2FF);
      border-radius: var(--r-sm);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      color: var(--accent);
    }
    .notif-icon svg { width: 18px; height: 18px; }

    .notif-content { flex: 1; min-width: 0; }

    .notif-header-row {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 5px;
    }
    .notif-title { font-size: 13.5px; font-weight: 700; color: var(--tx); }
    .notif-time  { font-size: 11.5px; color: var(--tx-pale); white-space: nowrap; flex-shrink: 0; }

    .notif-meta {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12.5px;
      color: var(--tx-muted);
      margin-bottom: 4px;
    }
    .notif-code { font-size: 11.5px; color: var(--accent); background: transparent; }
    .notif-sep  { color: var(--border); }
    .notif-hint { font-size: 11.5px; color: var(--tx-pale); }

    .notif-done-btn { flex-shrink: 0; align-self: center; display: flex; align-items: center; gap: 5px; }

    .notif-empty {
      display: flex; flex-direction: column; align-items: center;
      padding: 60px 20px; text-align: center;
    }

    .notif-count-bar {
      font-size: 13px; color: var(--tx-muted);
      margin-bottom: 16px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .notif-count-bar span#notifCount { font-weight: 600; }
  </style>
</head>
