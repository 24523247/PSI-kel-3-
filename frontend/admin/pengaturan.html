      <!-- Profil Admin -->
      <div class="card" style="padding:24px;margin-bottom:16px;max-width:560px">
        <h3 style="font-size:14px;font-weight:600;color:var(--tx);margin-bottom:16px;padding-bottom:12px;border-bottom:1px solid var(--border)">Profil Admin</h3>
        <div style="display:flex;align-items:center;gap:16px;margin-bottom:20px">
          <div style="width:56px;height:56px;border-radius:50%;background:var(--accent-lt);color:var(--accent);font-size:18px;font-weight:700;display:flex;align-items:center;justify-content:center;border:2px solid var(--border)" id="avatarBig">AB</div>
          <div>
            <div style="font-size:15px;font-weight:600;color:var(--tx)" id="profileName">Administrator</div>
            <div style="font-size:13px;color:var(--tx-muted)" id="profileUsername">admin</div>
          </div>
        </div>
      </div>

      <!-- Ganti Password -->
      <div class="card" style="padding:24px;max-width:560px">
        <h3 style="font-size:14px;font-weight:600;color:var(--tx);margin-bottom:16px;padding-bottom:12px;border-bottom:1px solid var(--border)">Ganti Password</h3>
        <div id="pwdError" style="background:var(--red-bg);border:1px solid #FCA5A5;border-radius:var(--r-sm);padding:10px 14px;font-size:13px;color:var(--red-tx);display:none;margin-bottom:14px"></div>
        <div id="pwdSuccess" style="background:var(--green-bg);border:1px solid #6EE7B7;border-radius:var(--r-sm);padding:10px 14px;font-size:13px;color:var(--green-tx);display:none;margin-bottom:14px"></div>
        <div style="display:flex;flex-direction:column;gap:14px">
          <div class="form-group"><label class="form-label">Password Lama</label><input type="password" class="form-input" id="pwdOld" placeholder="Masukkan password saat ini"></div>
          <div class="form-group"><label class="form-label">Password Baru</label><input type="password" class="form-input" id="pwdNew" placeholder="Minimal 6 karakter"></div>
          <div class="form-group"><label class="form-label">Konfirmasi Password Baru</label><input type="password" class="form-input" id="pwdConfirm" placeholder="Ulangi password baru"></div>
          <button class="btn btn-primary btn-sm" style="align-self:flex-start" onclick="changePassword()">Simpan Password</button>
        </div>
      </div>

    </div>

<div class="toast-container" id="toastContainer"></div>
<script src="js/auth.js"></script>
<script>
// Tampilkan info user setelah auth check
const _origCheck = window.__authLoaded;
document.addEventListener('DOMContentLoaded', async () => {
  try {
    const res  = await fetch('/backend/api/admin/auth.php', { credentials: 'include' });
    const json = await res.json();
    if (json.success) {
      document.getElementById('profileName').textContent     = json.user.name;
      document.getElementById('profileUsername').textContent = '@' + json.user.username;
      const initials = json.user.name.split(' ').map(w => w[0]).join('').slice(0,2).toUpperCase();
      document.getElementById('avatarBig').textContent = initials;
    }
  } catch {}
});

async function changePassword() {
  const oldPwd  = document.getElementById('pwdOld').value;
  const newPwd  = document.getElementById('pwdNew').value;
  const confirm = document.getElementById('pwdConfirm').value;
  const errEl   = document.getElementById('pwdError');
  const okEl    = document.getElementById('pwdSuccess');

  errEl.style.display = 'none';
  okEl.style.display  = 'none';

  if (!oldPwd || !newPwd || !confirm) { showPwdErr('Semua field wajib diisi'); return; }
  if (newPwd.length < 6)              { showPwdErr('Password baru minimal 6 karakter'); return; }
  if (newPwd !== confirm)             { showPwdErr('Konfirmasi password tidak cocok'); return; }

  // Coming soon — endpoint change-password belum dibuat
  okEl.textContent    = 'Fitur ganti password akan tersedia setelah integrasi penuh.';
  okEl.style.display  = 'block';
}

function showPwdErr(msg) {
  const el = document.getElementById('pwdError');
  el.textContent  = msg;
  el.style.display = 'block';
}
</script>
