<script src="js/auth.js"></script>
<script>
async function loadKategori() {
  const res  = await fetch('/backend/api/admin/menu.php', { credentials: 'include' });
  const json = await res.json();
  if (!json.success) return;

  const map = {};
  for (const p of json.data) {
    const cat = p.category;
    if (!map[cat]) map[cat] = { total: 0, aktif: 0 };
    map[cat].total++;
    if (p.is_active) map[cat].aktif++;
  }

  const colors = { makanan: '#4F46E5', minuman: '#059669' };
  const icons  = {
    makanan: '<path d="M18 8h1a4 4 0 010 8h-1"/><path d="M2 8h16v9a4 4 0 01-4 4H6a4 4 0 01-4-4V8z"/><line x1="6" y1="1" x2="6" y2="4"/><line x1="10" y1="1" x2="10" y2="4"/><line x1="14" y1="1" x2="14" y2="4"/>',
    minuman: '<path d="M8 2h8"/><path d="M9 2v2.789a4 4 0 01-.672 2.219l-.656.984A4 4 0 007 10.212V20a2 2 0 002 2h6a2 2 0 002-2v-9.789a4 4 0 00-.672-2.219l-.656-.984A4 4 0 0115 4.788V2"/>',
  };

  document.getElementById('kategoriGrid').innerHTML = Object.entries(map).map(([cat, d]) => `
    <div class="card" style="padding:24px">
      <div style="width:48px;height:48px;border-radius:var(--r-lg);background:${colors[cat] || '#6B7280'}20;display:flex;align-items:center;justify-content:center;margin-bottom:16px">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="${colors[cat] || '#6B7280'}" stroke-width="1.75">${icons[cat] || ''}</svg>
      </div>
      <div style="font-size:16px;font-weight:700;color:var(--tx);text-transform:capitalize;margin-bottom:4px">${cat}</div>
      <div style="font-size:13px;color:var(--tx-muted)">${d.total} produk &bull; ${d.aktif} aktif</div>
      <a href="kelola-menu.html?kategori=${encodeURIComponent(cat)}" class="btn btn-secondary btn-sm" style="margin-top:16px">
        Lihat Produk →
      </a>
    </div>`).join('');
}
loadKategori();
</script>
