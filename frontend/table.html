<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Menu - hygiene order</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="app-shell">

    <!-- ── Sticky Header ── -->
    <header class="app-header">
        <div class="header-top">
            <div class="header-brand">
                <h1>hygiene order</h1>
                <span id="tableInfo" class="table-chip">Memuat meja...</span>
            </div>
            <button class="cart-btn" onclick="openCart()" aria-label="Buka keranjang">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/>
                    <line x1="3" y1="6" x2="21" y2="6"/>
                    <path d="M16 10a4 4 0 01-8 0"/>
                </svg>
                <span class="cart-badge" id="cartBadge">0</span>
            </button>
        </div>

        <!-- Category Tabs -->
        <div class="category-tabs">
            <button class="tab-btn active" data-cat="all"     onclick="filterCategory('all')">Semua</button>
            <button class="tab-btn"        data-cat="makanan" onclick="filterCategory('makanan')">🍛 Makanan</button>
            <button class="tab-btn"        data-cat="minuman" onclick="filterCategory('minuman')">🥤 Minuman</button>
        </div>
    </header>

    <!-- ── Main Content ── -->
    <main class="menu-main">

        <!-- AI Recommendation -->
        <div class="ai-section">
            <div class="ai-section-header">
                <span class="ai-icon">✨</span>
                <div>
                    <h3>Rekomendasi AI</h3>
                    <p>Mau makan apa hari ini?</p>
                </div>
            </div>
            <div class="ai-chips">
                <button class="ai-chip" onclick="askAI('Saya lapar banget, mau yang mengenyangkan')">Lapar banget</button>
                <button class="ai-chip" onclick="askAI('Mau yang segar dan ringan')">Seger & ringan</button>
                <button class="ai-chip" onclick="askAI('Pengen yang pedas dan gurih')">Pedas</button>
                <button class="ai-chip" onclick="askAI('Rekomendasikan minuman yang enak')">Minuman aja</button>
                <button class="ai-chip" onclick="askAI('Budget terbatas tapi mau kenyang')">Hemat</button>
            </div>
            <div class="ai-input-row">
                <input type="text" id="aiInput" class="ai-input"
                    placeholder="Ceritakan kamu lagi pengen apa..."
                    onkeydown="if(event.key==='Enter') askAI()">
                <button id="btnAsk" class="btn-ai-ask" onclick="askAI()">Tanya</button>
            </div>
            <div id="aiResult" class="ai-result hidden"></div>
        </div>

        <!-- AI Reco Strip (muncul setelah rekomendasi didapat) -->
        <div id="aiRecoSection" class="ai-reco-section hidden" style="margin-top:16px">
            <p class="section-label">✨ Rekomendasi untukmu</p>
            <div class="ai-reco-scroll" id="aiRecoScroll"></div>
        </div>

        <!-- Menu Grid -->
        <div id="menuGrid" class="menu-grid" style="margin-top:16px">
            <div class="loading" style="grid-column:1/-1">Memuat menu...</div>
        </div>

    </main>

</div><!-- end .app-shell -->

<!-- ── Sticky Cart Bar ── -->
<div class="cart-bar hidden" id="cartBar" onclick="openCart()">
    <div class="cart-bar-left">
        <span class="cart-bar-count" id="cartBarCount">0 item</span>
        <span class="cart-bar-total" id="cartBarTotal">Rp 0</span>
    </div>
    <div class="cart-bar-right">
        Lihat Pesanan
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="9 18 15 12 9 6"/></svg>
    </div>
</div>

<!-- ── Modal Overlay ── -->
<div class="modal-overlay hidden" id="modalOverlay" onclick="closeCart()"></div>

<!-- ── Cart Modal ── -->
<div class="cart-modal hidden" id="cartModal">
    <div class="modal-header">
        <h3>Pesananmu</h3>
        <button class="btn-close-modal" onclick="closeCart()">✕</button>
    </div>
    <div class="modal-body">
        <div id="cartModalList"></div>
        <div class="cart-total-row">
            <span>Total</span>
            <strong id="cartModalTotal">Rp 0</strong>
        </div>
    </div>
    <div class="modal-footer">
        <button id="btnOrder" class="btn-checkout">Pesan &amp; Bayar</button>
    </div>
</div>

<!-- ── Toast ── -->
<div id="toast" class="toast hidden"></div>

<script>
// ============================================================
// Config & Constants
// ============================================================
const API_BASE = '/backend/api';

const CARD_THEMES = {
    makanan: [
        { bg: 'linear-gradient(135deg,#f093fb 0%,#f5576c 100%)', emoji: '🍛' },
        { bg: 'linear-gradient(135deg,#ffeaa7 0%,#fdcb6e 100%)', emoji: '🍜' },
        { bg: 'linear-gradient(135deg,#fd9644 0%,#e17055 100%)', emoji: '🍗' },
        { bg: 'linear-gradient(135deg,#a29bfe 0%,#6c5ce7 100%)', emoji: '🥗' },
        { bg: 'linear-gradient(135deg,#55efc4 0%,#00b894 100%)', emoji: '🍲' },
        { bg: 'linear-gradient(135deg,#ffecd2 0%,#fcb69f 100%)', emoji: '🍱' },
    ],
    minuman: [
        { bg: 'linear-gradient(135deg,#a1c4fd 0%,#c2e9fb 100%)', emoji: '🧃' },
        { bg: 'linear-gradient(135deg,#43e97b 0%,#38f9d7 100%)', emoji: '🥤' },
        { bg: 'linear-gradient(135deg,#4facfe 0%,#00f2fe 100%)', emoji: '🧋' },
        { bg: 'linear-gradient(135deg,#6a3093 0%,#a044ff 100%)', emoji: '☕' },
        { bg: 'linear-gradient(135deg,#a8edea 0%,#fed6e3 100%)', emoji: '🍵' },
    ]
};

// ============================================================
// State
// ============================================================
const urlParams  = new URLSearchParams(window.location.search);
const tableCode  = urlParams.get('table');

let tableId           = null;
let products          = [];
let cart              = {};
let midtransClientKey = null;
let currentCategory   = 'all';
let aiHighlighted     = new Set();
let productThemes     = {};

// ============================================================
// Init
// ============================================================
async function init() {
    if (!tableCode) {
        showToast('Parameter meja tidak ditemukan. Silakan scan ulang QR Code.', 'error');
        return;
    }
    await loadClientConfig();
    await loadTable();
    await loadProducts();
}

async function loadClientConfig() {
    try {
        const res  = await fetch(`${API_BASE}/client-config.php`);
        const json = await res.json();
        if (json.success) midtransClientKey = json.midtrans_client_key;
    } catch(e) {
        console.warn('Config Midtrans belum diisi. Fitur bayar tidak aktif.');
    }
}

function loadSnapScript(clientKey, snapUrl) {
    return new Promise((resolve, reject) => {
        if (window.snap) { resolve(); return; }
        const script = document.createElement('script');
        script.src = snapUrl;
        script.setAttribute('data-client-key', clientKey);
        script.onload  = resolve;
        script.onerror = () => reject(new Error('Gagal memuat snap.js dari Midtrans. Cek koneksi internet.'));
        document.head.appendChild(script);
    });
}

async function loadTable() {
    try {
        const res  = await fetch(`${API_BASE}/table.php?code=${tableCode}`);
        const json = await res.json();
        if (!json.success) { showToast('Meja tidak dikenali: ' + json.message, 'error'); return; }
        tableId = json.data.id;
        document.getElementById('tableInfo').textContent = '📍 ' + json.data.table_name;
        document.title = json.data.table_name + ' - Warung Pak Budi';
    } catch(e) {
        showToast('Gagal memuat data meja. Pastikan server berjalan.', 'error');
    }
}

async function loadProducts() {
    try {
        const res  = await fetch(`${API_BASE}/products.php`);
        const json = await res.json();
        if (!json.success) { showToast('Gagal memuat menu: ' + json.message, 'error'); return; }
        products = json.data;
        buildProductThemes();
        renderMenu();
    } catch(e) {
        showToast('Gagal memuat menu. Pastikan server berjalan.', 'error');
    }
}

// Buat mapping product id → tema warna/emoji sekali saat produk dimuat
function buildProductThemes() {
    const counters = {};
    products.forEach(p => {
        const cat    = p.category;
        const themes = CARD_THEMES[cat] || CARD_THEMES.makanan;
        const idx    = counters[cat] = (counters[cat] || 0);
        counters[cat]++;
        productThemes[p.id] = themes[idx % themes.length];
    });
}

// ============================================================
// Menu Rendering
// ============================================================
function renderMenu() {
    const grid     = document.getElementById('menuGrid');
    const filtered = currentCategory === 'all'
        ? products
        : products.filter(p => p.category === currentCategory);

    if (filtered.length === 0) {
        grid.innerHTML = '<div class="loading" style="grid-column:1/-1">Menu tidak tersedia</div>';
        return;
    }

    grid.innerHTML = filtered.map(p => {
        const theme       = productThemes[p.id] || CARD_THEMES.makanan[0];
        const qty         = cart[p.id] || 0;
        const highlighted = aiHighlighted.has(p.id) ? 'ai-highlighted' : '';
        const imgContent  = p.image_url
            ? `<img src="${esc(p.image_url)}" alt="${esc(p.name)}" loading="lazy">`
            : `<span>${theme.emoji}</span>`;

        return `
        <div class="menu-card ${highlighted}" id="card-${p.id}">
            <div class="card-img" style="background:${theme.bg}">${imgContent}</div>
            <div class="card-body">
                <div class="card-name">${esc(p.name)}</div>
                ${p.description ? `<div class="card-desc">${esc(p.description)}</div>` : ''}
                <div class="card-footer">
                    <span class="card-price">${formatRp(p.price)}</span>
                    <div id="ctrl-${p.id}">${renderCtrl(p.id, qty)}</div>
                </div>
            </div>
        </div>`;
    }).join('');
}

function renderCtrl(productId, qty) {
    if (qty === 0) {
        return `<button class="btn-add" onclick="changeQty(${productId}, 1)">+ Tambah</button>`;
    }
    return `
        <div class="card-qty">
            <button class="btn-qty-sm" onclick="changeQty(${productId}, -1)">−</button>
            <span class="qty-num">${qty}</span>
            <button class="btn-qty-sm" onclick="changeQty(${productId}, 1)">+</button>
        </div>`;
}

function filterCategory(cat) {
    currentCategory = cat;
    document.querySelectorAll('.tab-btn').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.cat === cat);
    });
    renderMenu();
}

// ============================================================
// Cart Logic
// ============================================================
function changeQty(productId, delta) {
    const current = cart[productId] || 0;
    const newQty  = current + delta;
    if (newQty <= 0) {
        delete cart[productId];
    } else {
        cart[productId] = newQty;
    }

    // Update kontrol di kartu (jika kartu masih terlihat)
    const ctrl = document.getElementById('ctrl-' + productId);
    if (ctrl) ctrl.innerHTML = renderCtrl(productId, cart[productId] || 0);

    updateCartBar();

    // Jika modal terbuka, refresh isinya
    if (!document.getElementById('cartModal').classList.contains('hidden')) {
        renderCartModal();
    }
}

function updateCartBar() {
    const keys       = Object.keys(cart);
    const totalItems = keys.reduce((s, pid) => s + cart[pid], 0);
    const totalPrice = keys.reduce((s, pid) => {
        const p = products.find(p => p.id == pid);
        return s + (p ? p.price * cart[pid] : 0);
    }, 0);

    const bar   = document.getElementById('cartBar');
    const badge = document.getElementById('cartBadge');

    if (totalItems === 0) {
        bar.classList.add('hidden');
        badge.classList.remove('visible');
    } else {
        bar.classList.remove('hidden');
        badge.classList.add('visible');
        badge.textContent = totalItems > 9 ? '9+' : totalItems;
        document.getElementById('cartBarCount').textContent = totalItems + ' item';
        document.getElementById('cartBarTotal').textContent = formatRp(totalPrice);
    }
}

function renderCartModal() {
    const keys = Object.keys(cart);
    let total  = 0;
    let html   = '';

    keys.forEach(pid => {
        const p = products.find(p => p.id == pid);
        if (!p) return;
        const qty   = cart[pid];
        const sub   = p.price * qty;
        total      += sub;
        const theme = productThemes[p.id] || CARD_THEMES.makanan[0];

        html += `
        <div class="cart-item-row">
            <div class="cart-item-emoji">${theme.emoji}</div>
            <div class="cart-item-info">
                <div class="cart-item-name">${esc(p.name)}</div>
                <div class="cart-item-price-line">${formatRp(p.price)} × ${qty} = ${formatRp(sub)}</div>
            </div>
            <div class="cart-item-qty-ctrl">
                <button class="btn-qty-sm" onclick="changeQty(${p.id}, -1)">−</button>
                <span class="qty-num">${qty}</span>
                <button class="btn-qty-sm" onclick="changeQty(${p.id}, 1)">+</button>
            </div>
        </div>`;
    });

    if (!html) {
        html = '<p style="color:var(--muted);font-size:.88rem;padding:16px 0;text-align:center">Keranjang kosong</p>';
    }

    document.getElementById('cartModalList').innerHTML  = html;
    document.getElementById('cartModalTotal').textContent = formatRp(total);
}

function openCart() {
    renderCartModal();
    document.getElementById('cartModal').classList.remove('hidden');
    document.getElementById('modalOverlay').classList.remove('hidden');
    document.body.style.overflow = 'hidden';
}

function closeCart() {
    document.getElementById('cartModal').classList.add('hidden');
    document.getElementById('modalOverlay').classList.add('hidden');
    document.body.style.overflow = '';
}

// ============================================================
// AI Recommendation
// ============================================================
async function askAI(preset) {
    const input    = document.getElementById('aiInput');
    const query    = preset || input.value.trim();

    if (!query) { showToast('Ceritakan dulu kamu lagi pengen apa!', 'warning'); return; }
    if (preset) input.value = preset;

    const btn      = document.getElementById('btnAsk');
    const resultEl = document.getElementById('aiResult');

    btn.disabled      = true;
    btn.textContent   = '⏳';
    resultEl.classList.remove('hidden');
    resultEl.textContent = 'Sedang berpikir...';

    try {
        const res  = await fetch(`${API_BASE}/ai-recommend.php`, {
            method:  'POST',
            headers: { 'Content-Type': 'application/json' },
            body:    JSON.stringify({ preference: query }),
        });
        const json = await res.json();

        if (!json.success || !json.data || json.data.length === 0) {
            resultEl.textContent = json.message || 'Tidak ada rekomendasi saat ini.';
            return;
        }

        const recos = json.data;
        resultEl.textContent = `Menemukan ${recos.length} menu yang cocok untukmu!`;

        // Tandai kartu yang direkomendasikan
        aiHighlighted = new Set(recos.map(r => r.id));
        filterCategory('all'); // pastikan semua menu terlihat
        renderRecoStrip(recos);

    } catch(e) {
        resultEl.textContent = 'Gagal terhubung ke AI. Coba lagi nanti.';
    } finally {
        btn.disabled    = false;
        btn.textContent = 'Tanya';
    }
}

function renderRecoStrip(recos) {
    const section = document.getElementById('aiRecoSection');
    const scroll  = document.getElementById('aiRecoScroll');

    scroll.innerHTML = recos.map(r => {
        const theme = productThemes[r.id] || CARD_THEMES.makanan[0];
        return `
        <div class="reco-card" onclick="highlightCard(${r.id})">
            <div class="reco-badge">✨ AI Pick</div>
            <div class="reco-img" style="background:${theme.bg}">${theme.emoji}</div>
            <div class="reco-info">
                <div class="reco-name">${esc(r.name)}</div>
                <div class="reco-reason">${esc(r.reason)}</div>
                <div class="reco-price">${formatRp(r.price)}</div>
            </div>
        </div>`;
    }).join('');

    section.classList.remove('hidden');
}

function highlightCard(productId) {
    const card = document.getElementById('card-' + productId);
    if (!card) return;
    card.scrollIntoView({ behavior: 'smooth', block: 'center' });
    card.style.transition = 'transform .2s';
    card.style.transform  = 'scale(1.04)';
    setTimeout(() => { card.style.transform = ''; }, 400);
}

// ============================================================
// Payment (logika tidak diubah)
// ============================================================
document.getElementById('btnOrder').addEventListener('click', async function() {
    if (!tableCode) { showToast('Kode meja tidak valid.', 'error'); return; }

    const keys = Object.keys(cart);
    if (keys.length === 0) { showToast('Pilih menu terlebih dahulu!', 'warning'); return; }

    const items = keys.map(pid => ({ product_id: parseInt(pid), qty: cart[pid] }));

    if (!midtransClientKey || midtransClientKey.includes('GANTI_DENGAN')) {
        showToast('⚠️ Client Key Midtrans belum dikonfigurasi di backend/config.php', 'error');
        return;
    }

    this.disabled    = true;
    this.textContent = '⏳ Memproses...';

    try {
        // Step 1: Buat order
        const orderRes  = await fetch(`${API_BASE}/create-order.php`, {
            method:  'POST',
            headers: { 'Content-Type': 'application/json' },
            body:    JSON.stringify({ table_code: tableCode, items }),
        });
        const orderJson = await orderRes.json();

        if (!orderJson.success) {
            showToast('Gagal membuat pesanan: ' + orderJson.message, 'error');
            resetOrderButton();
            return;
        }

        const orderCode = orderJson.data.order_code;

        // Step 2: Buat transaksi Midtrans & dapatkan snap_token
        const payRes  = await fetch(`${API_BASE}/create-payment.php`, {
            method:  'POST',
            headers: { 'Content-Type': 'application/json' },
            body:    JSON.stringify({ order_code: orderCode }),
        });
        const payJson = await payRes.json();

        if (!payJson.success) {
            showToast('Gagal membuat pembayaran: ' + payJson.message, 'error');
            resetOrderButton();
            return;
        }

        // Step 3: Simpan token & arahkan ke halaman checkout (snap.embed)
        sessionStorage.setItem('snap_token',      payJson.snap_token);
        sessionStorage.setItem('snap_client_key', midtransClientKey);

        window.location.href = `checkout.html?order=${encodeURIComponent(orderCode)}&table=${encodeURIComponent(tableCode)}`;

    } catch(e) {
        showToast('Terjadi kesalahan: ' + e.message, 'error');
        resetOrderButton();
    }
});

function resetOrderButton() {
    const btn    = document.getElementById('btnOrder');
    btn.disabled    = false;
    btn.textContent = 'Pesan & Bayar';
}

// ============================================================
// Helpers
// ============================================================
function formatRp(amount) {
    return 'Rp ' + Number(amount).toLocaleString('id-ID');
}

function esc(str) {
    return String(str)
        .replace(/&/g,'&amp;')
        .replace(/</g,'&lt;')
        .replace(/>/g,'&gt;')
        .replace(/"/g,'&quot;');
}

let _toastTimer;
function showToast(msg, type) {
    const el      = document.getElementById('toast');
    el.textContent = msg;
    el.className   = 'toast' + (type ? ' ' + type : '');
    clearTimeout(_toastTimer);
    _toastTimer = setTimeout(() => el.classList.add('hidden'), 4000);
}

// ── Run ──
init();
</script>
</body>
</html>
