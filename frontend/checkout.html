<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Pembayaran - hygiene order</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="checkout-page">

    <!-- Header -->
    <header class="checkout-header">
        <button class="btn-back" onclick="history.back()" aria-label="Kembali">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="15 18 9 12 15 6"/>
            </svg>
        </button>
        <h1>Pembayaran</h1>
        <div style="width:36px"></div><!-- spacer agar judul tengah -->
    </header>

    <div class="checkout-main">

        <!-- Ringkasan Pesanan -->
        <div class="order-summary-card" id="orderSummary">
            <div class="loading">Memuat detail pesanan...</div>
        </div>

        <!-- SNAP Embed Area -->
        <div id="snap-container" class="snap-container">
            <div class="snap-loading" id="snapLoading">
                <div class="spinner"></div>
                <p>Memuat halaman pembayaran...</p>
            </div>
        </div>

        <!-- Simulator Sandbox -->
        <div class="simulator-card">
            <div class="simulator-info">
                <div class="simulator-desc">Simulasikan pembayaran QRIS di environment sandbox Midtrans</div>
                <div class="simulator-desc">Bayar dengan cara VA BCA atau metode lainya</div>
            </div>
            <a href="https://simulator.sandbox.midtrans.com/bca/va/index"
               target="_blank" rel="noopener noreferrer"
               class="btn-simulator">
                Buka Link ini →
            </a>
        </div>

    </div><!-- end .checkout-main -->
</div><!-- end .checkout-page -->

<!-- Toast -->
<div id="toast" class="toast hidden"></div>

<script src="js/checkout.js"></script>
</body>
</html>
